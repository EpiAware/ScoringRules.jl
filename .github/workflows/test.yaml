# MANAGED by EpiAwarePackageTools.scaffold — do not edit by hand.
name: Test

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: EpiAware/.github/.github/workflows/tests.yml@6fcdcde033ec670ac3832b239427fd2ded591bbc
    with:
      # The managed standard needs Julia 1.11: `[sources]` (how test/Project.toml
      # pins the kit to main) is a Pkg 1.11 feature, and on 1.10 it is silently
      # ignored — the job then resolves the registered kit rather than the
      # pinned rev and tests a stale kit while appearing to test this one
      # (see issue #10; same fix as ComposedDistributions). The reusable defaults to ["1", "lts", "pre"]; drop the lts leg.
      julia_versions: '["1", "pre"]'
    secrets: inherit  # pragma: allowlist secret

  # downgrade-compat is disabled: even with the Distributions floor above
  # fixed, `Pkg.test`'s minimum-version resolve floors EpiAwarePackageTools
  # to the registered v0.1.0, which predates `run_package_tests` — the same
  # class of "downgrade + unregistered [sources] pin" break documented in
  # DistributionsInference#40 (there it was a compat-graph conflict on a
  # sibling package; here it is a stale registered floor of the kit itself),
  # and the same reason ComposedDistributions dropped this job. There is no
  # registered EpiAwarePackageTools version carrying the entry point this
  # package's test/runtests.jl calls, so raising a compat floor cannot fix
  # it. Restore this job once EpiAwarePackageTools has a registered release
  # with `run_package_tests` (kit registration is tracked separately; see
  # the org's needs-Sam backlog).
