# MANAGED by EpiAwarePackageTools.scaffold — do not edit by hand.
name: Test

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: EpiAware/.github/.github/workflows/tests.yml@26387a36be3d093723b5f85e4f93d99af98456b8
    with:
      # The managed standard needs Julia 1.11: `[sources]` (how test/Project.toml
      # pins the kit to main) is a Pkg 1.11 feature, and on 1.10 it is silently
      # ignored — the job then resolves the registered kit rather than the
      # pinned rev and tests a stale kit while appearing to test this one
      # (#246). The reusable defaults to ["1", "lts", "pre"]; drop the lts leg.
      julia_versions: '["1", "pre"]'
    secrets: inherit  # pragma: allowlist secret
