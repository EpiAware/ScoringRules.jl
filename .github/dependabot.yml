# MANAGED by EpiAwarePackageTools.scaffold — do not edit by hand.
# Configure Dependabot version updates
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
version: 2
updates:
  # GitHub Actions: keeps the reusable-workflow pins (and any actions) current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Bundle every github-actions bump (third-party actions + the EpiAware
    # reusable-workflow SHAs) into a single grouped PR per run, so one
    # EpiAware/.github change no longer spawns a separate PR per workflow file
    # that references it (#249).
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 10
    reviewers:
      - "sbfnk"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Julia dependencies. Uses the workspace feature (Julia 1.12+) to coordinate
  # updates across the main package, test/, docs/, and (when benchmarks are
  # enabled) the benchmark/ environment.
  - package-ecosystem: "julia"
    directory: "/"
    schedule:
      interval: "weekly"
    # One grouped PR per run for all Julia dependency bumps across the
    # workspace environments, rather than a separate PR per package (#249).
    groups:
      julia:
        patterns:
          - "*"
    open-pull-requests-limit: 10
    reviewers:
      - "sbfnk"
    commit-message:
      prefix: "chore"
      include: "scope"
